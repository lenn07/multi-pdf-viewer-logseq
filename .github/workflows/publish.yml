name: Build plugin

on:
  push:
    tags:
      - "v*"

env:
  PLUGIN_NAME: multi-pdf-viewer

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Package plugin
        run: |
          mkdir ${{ env.PLUGIN_NAME }}
          cp -r dist ${{ env.PLUGIN_NAME }}/
          mkdir -p ${{ env.PLUGIN_NAME }}/public
          cp public/icon.png ${{ env.PLUGIN_NAME }}/public/
          cp plugin.edn package.json README.md LICENSE ${{ env.PLUGIN_NAME }}/
          zip -r ${{ env.PLUGIN_NAME }}-${{ github.ref_name }}.zip ${{ env.PLUGIN_NAME }}

      - name: Create release
        uses: ncipollo/release-action@v1
        with:
          artifacts: "${{ env.PLUGIN_NAME }}-${{ github.ref_name }}.zip,package.json"
          allowUpdates: true
          draft: false
          prerelease: false
          token: ${{ secrets.GITHUB_TOKEN }}
