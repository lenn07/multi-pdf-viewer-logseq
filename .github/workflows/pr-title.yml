name: Lint PR Title

# Stellt sicher, dass der PR-Titel den Conventional-Commits-Regeln folgt.
# Wichtig beim Squash-Merge: Der PR-Titel wird zur Commit-Message auf main,
# und genau daraus leitet release-please die nächste Version ab.

on:
  pull_request:
    types:
      - opened
      - edited
      - synchronize

permissions:
  pull-requests: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            docs
            chore
            refactor
            test
            ci
            build
            perf
